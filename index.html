function lookupTransition(transitions, fromPoseId, toPoseId) {
  const specific = transitions.find(t => t.toPoseId === toPoseId && t.fromPoseId === fromPoseId);
  if (specific) return specific;
  return transitions.find(t => t.toPoseId === toPoseId && t.fromPoseId === null) || null;
}
function emptyTransition() { return { libraryId: null, cues: [], enabled: false }; }
function flipSide(side) { return side === 'right' ? 'left' : side === 'left' ? 'right' : side; }

function Btn({ children, variant='primary', size='sm', onClick, type='button', disabled, className='' }) {
  const base = 'inline-flex items-center gap-1.5 font-medium rounded-lg transition-all duration-150 disabled:opacity-40 disabled:cursor-not-allowed';
  const sizes = { xs:'px-2 py-1 text-xs', sm:'px-3 py-1.5 text-sm', md:'px-4 py-2 text-sm', lg:'px-5 py-2.5 text-base' };
  const variants = {
    primary: 'bg-sage-600 hover:bg-sage-700 text-white shadow-sm',
    secondary: 'bg-white hover:bg-stone-50 text-stone-700 border border-stone-200 shadow-sm',
    ghost: 'hover:bg-stone-100 text-stone-600',
    danger: 'bg-red-500 hover:bg-red-600 text-white shadow-sm',
    terra: 'bg-terra-500 hover:bg-terra-600 text-white shadow-sm',
  };
  return <button type={type} onClick={onClick} disabled={disabled} className={`${base} ${sizes[size]} ${variants[variant]} ${className}`}>{children}</button>;
}

function Modal({ title, onClose, children, wide, full }) {
  useEffect(() => {
    const fn = (e) => { if (e.key === 'Escape') onClose(); };
    document.addEventListener('keydown', fn);
    return () => document.removeEventListener('keydown', fn);
  }, [onClose]);
  const w = full ? 'w-[95vw] h-[92vh]' : wide ? 'w-[90vw] max-w-5xl max-h-[90vh]' : 'w-full max-w-lg max-h-[90vh]';
  return (
    <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/40 backdrop-blur-sm fade-in" onClick={(e) => e.target === e.currentTarget && onClose()}>
      <div className={`bg-white rounded-2xl shadow-2xl flex flex-col overflow-hidden ${w}`}>
        <div className="flex items-center justify-between px-6 py-4 border-b border-stone-100 shrink-0">
          <h2 className="font-display text-xl text-stone-800">{title}</h2>
          <button onClick={onClose} className="p-1.5 rounded-lg hover:bg-stone-100 text-stone-400 hover:text-stone-600 transition-colors">{Icon.x}</button>
        </div>
        <div className="flex-1 overflow-auto">{children}</div>
      </div>
    </div>
  );
}

}

function CueList({ cues, onChange }) {
  const [draft, setDraft] = useState('');
  const add = () => { const v = draft.trim(); if (v) { onChange([...cues, v]); setDraft(''); } };
  return (
    <div className="space-y-1.5">
      {cues.map((c, i) => (
        <div key={i} className="flex items-center gap-2 group">
          <span className="w-1.5 h-1.5 rounded-full bg-sage-400 shrink-0 mt-0.5" />
          <input
            value={c}
            onChange={(e) => { const a=[...cues]; a[i]=e.target.value; onChange(a); }}
            className="flex-1 text-sm bg-transparent border-b border-transparent focus:border-sage-300 py-0.5 text-stone-700 transition-colors"
          />
          <button onClick={() => onChange(cues.filter((_,j)=>j!==i))} className="opacity-0 group-hover:opacity-100 text-stone-400 hover:text-red-400 transition-all p-0.5 rounded">{Icon.x}</button>
        </div>
      ))}
      <div className="flex gap-2 mt-2">
        <input
          value={draft}
          onChange={(e) => setDraft(e.target.value)}
          onKeyDown={(e) => e.key === 'Enter' && (e.preventDefault(), add())}
          placeholder="Add cue and press Enter…"
          className="flex-1 text-sm border border-stone-200 rounded-lg px-3 py-1.5 focus:border-sage-400 focus:ring-2 focus:ring-sage-100 transition-all"
        />
        <Btn variant="secondary" size="xs" onClick={add}>{Icon.plus}</Btn>
      </div>
    </div>
  );
}

// ─── Drag-reorder hook ────────────────────────────────────────────────────────
function useDragSort(items, setItems) {
  const dragIdx = useRef(null);
  const onDragStart = useCallback((i) => { dragIdx.current = i; }, []);
  const onDrop = useCallback((i) => {
    if (dragIdx.current !== null && dragIdx.current !== i) {
      setItems(reorder(items, dragIdx.current, i));
    }
    dragIdx.current = null;
  }, [items, setItems]);
  return { onDragStart, onDrop };
}

    categories: pose?.categories ? [...pose.categories] : [],
    cues: pose?.cues ? [...pose.cues] : [],
    variations: pose?.variations ? pose.variations.map(v => ({ ...v, cues: [...v.cues] })) : [],
  });
  const toggleCat = (cat) => set('categories',
    form.categories.includes(cat) ? form.categories.filter(c=>c!==cat) : [...form.categories, cat]
  );
  const set = (k, v) => setForm(f => ({ ...f, [k]: v }));
  const addVariation = () => set('variations', [...form.variations, { id: uid(), name: '', cues: [] }]);
  const updateVariation = (vi, field, val) => set('variations', form.variations.map((v, i) => i === vi ? { ...v, [field]: val } : v));
  const removeVariation = (vi) => set('variations', form.variations.filter((_, i) => i !== vi));
  const save = () => {
    if (!form.name.trim()) return;
    onSave({ ...pose, ...form, id: pose?.id || uid() });
  };
  return (
    <Modal title={pose ? 'Edit Pose' : 'Add New Pose'} onClose={onClose}>
      <div className="p-6 space-y-5">
        <div>
          <label className="block text-xs font-medium text-stone-500 uppercase tracking-wider mb-1.5">Pose Name *</label>
          <input value={form.name} onChange={(e)=>set('name',e.target.value)}
            className="w-full border border-stone-200 rounded-xl px-4 py-2.5 focus:border-sage-400 focus:ring-2 focus:ring-sage-100 transition-all text-stone-800 font-medium"
            placeholder="e.g. Downward Facing Dog" />
        </div>
        <div>
          <label className="block text-xs font-medium text-stone-500 uppercase tracking-wider mb-1.5">Description</label>
          <textarea value={form.description} onChange={(e)=>set('description',e.target.value)} rows={2}
            className="w-full border border-stone-200 rounded-xl px-4 py-2.5 focus:border-sage-400 focus:ring-2 focus:ring-sage-100 transition-all text-stone-600 resize-none"
            placeholder="Brief description of the pose…" />
        </div>
        <div>
          <label className="block text-xs font-medium text-stone-500 uppercase tracking-wider mb-1.5">Image</label>
          <div className="flex gap-2 mb-2">
            <input value={form.imageUrl} onChange={(e)=>set('imageUrl',e.target.value)}
              className="flex-1 border border-stone-200 rounded-xl px-4 py-2.5 focus:border-sage-400 focus:ring-2 focus:ring-sage-100 transition-all text-sm"
              placeholder="Paste image URL here…" />
            <Btn variant="secondary" size="sm" onClick={()=>openGoogleImages(form.name||'yoga')}>
              {Icon.search} Google Images ↗
            </Btn>
          </div>
          {form.imageUrl && (
            <div className="h-32 w-32 rounded-xl overflow-hidden border border-stone-200">
              <PoseImg src={form.imageUrl} alt="preview" />
            </div>
          )}
        </div>
        <div>
          <button type="button" onClick={()=>set('isSided',!form.isSided)}
            className="flex items-center gap-3 w-full text-left group">
            <div className={`w-10 h-5.5 rounded-full relative transition-colors flex items-center px-0.5 ${form.isSided ? 'bg-sage-500' : 'bg-stone-200'}`}
              style={{height:'22px',width:'40px'}}>
              <div className={`w-4 h-4 rounded-full bg-white shadow-sm transition-transform ${form.isSided ? 'translate-x-[18px]' : 'translate-x-0'}`} />
            </div>
            <div>
              <p className="text-sm font-medium text-stone-700">One-sided pose</p>
              <p className="text-xs text-stone-400">Requires a left or right side when sequencing</p>
            </div>
          </button>
        </div>
        <div>
          <label className="block text-xs font-medium text-stone-500 uppercase tracking-wider mb-2">Categories</label>
          <div className="flex flex-wrap gap-1.5">
            {POSE_CATEGORIES.map(cat => (
              <button key={cat} type="button" onClick={() => toggleCat(cat)}
                className={`px-2.5 py-1 rounded-lg text-xs font-medium transition-all ${
                  form.categories.includes(cat)
                    ? 'bg-sage-500 text-white shadow-sm'
                    : 'bg-stone-100 text-stone-500 hover:bg-stone-200'
                }`}>
                {cat}
              </button>
            ))}
          </div>
        </div>
        <div>
          <div className="flex items-center justify-between mb-2">
            <label className="block text-xs font-medium text-stone-500 uppercase tracking-wider">Variations</label>
            <button type="button" onClick={addVariation}
              className="flex items-center gap-1 text-xs text-sage-600 hover:text-sage-700 font-medium transition-colors">
              {Icon.plus} Add variation
            </button>
          </div>
          {form.variations.length === 0 && (
            <p className="text-xs text-stone-400 italic">No variations yet — add a variation to give this pose alternate forms (e.g. Cactus Arms)</p>
          )}
          <div className="space-y-3">
            {form.variations.map((variation, vi) => (
              <div key={variation.id} className="border border-stone-200 rounded-xl p-3 space-y-2.5">
                <div className="flex items-center gap-2">
                  <input value={variation.name}
                    onChange={(e) => updateVariation(vi, 'name', e.target.value)}
                    placeholder="Variation name (e.g. Cactus Arms)"
                    className="flex-1 text-sm border border-stone-200 rounded-lg px-3 py-1.5 focus:border-sage-400 focus:ring-1 focus:ring-sage-100 transition-all font-medium" />
                  <button type="button" onClick={() => removeVariation(vi)}
                    className="text-stone-300 hover:text-red-400 transition-colors p-1 rounded shrink-0">{Icon.x}</button>
                </div>
                <div>
                  <p className="text-xs text-stone-400 mb-1.5">Variation cues</p>
                  <CueList cues={variation.cues} onChange={(v) => updateVariation(vi, 'cues', v)} />
                </div>
              </div>
            ))}
          </div>
        </div>
        <div>
          <label className="block text-xs font-medium text-stone-500 uppercase tracking-wider mb-3">Verbal Cues</label>
          <CueList cues={form.cues} onChange={(v)=>set('cues',v)} />
        </div>
      </div>
      <div className="px-6 py-4 border-t border-stone-100 flex justify-end gap-3 shrink-0">
        <Btn variant="secondary" onClick={onClose}>Cancel</Btn>
        <Btn variant="primary" onClick={save} disabled={!form.name.trim()}>Save Pose</Btn>
      </div>
    </Modal>
  );
}

// ─── Pose Detail Drawer ───────────────────────────────────────────────────────
function PoseDetailDrawer({ pose, onEdit, onClose }) {
  if (!pose) return null;
  return (
    <div className="fixed inset-0 z-40 flex justify-end fade-in" onClick={(e)=>e.target===e.currentTarget&&onClose()}>
      <div className="bg-white w-80 h-full shadow-2xl flex flex-col overflow-hidden border-l border-stone-100">
        <div className="flex items-center justify-between px-5 py-4 border-b border-stone-100">
          <h3 className="font-display text-lg text-stone-800 truncate">{pose.name}</h3>
          <button onClick={onClose} className="p-1.5 rounded-lg hover:bg-stone-100 text-stone-400">{Icon.x}</button>
        </div>
        <div className="flex-1 overflow-auto">
          <div className="h-56 bg-sage-50">
            <PoseImg src={pose.imageUrl} alt={pose.name} />
          </div>
          {pose.description && <p className="px-5 pt-4 text-sm text-stone-600 leading-relaxed">{pose.description}</p>}
          {pose.categories?.length > 0 && (
            <div className="px-5 pt-4 flex flex-wrap gap-1.5">
              {pose.categories.map(cat => (
                <span key={cat} className="px-2 py-0.5 bg-sage-100 text-sage-700 text-xs rounded-full font-medium">{cat}</span>
              ))}
            </div>
          )}
          {pose.cues.length > 0 && (
            <div className="px-5 pt-4">
              <p className="text-xs font-medium text-stone-500 uppercase tracking-wider mb-3">Verbal Cues</p>
              <ul className="space-y-2">
                {pose.cues.map((c,i) => (
                  <li key={i} className="flex gap-2 text-sm text-stone-700">
                    <span className="w-1.5 h-1.5 rounded-full bg-sage-400 shrink-0 mt-1.5" />
                    {c}
                  </li>
                ))}
              </ul>
            </div>
          )}
          {(pose.variations||[]).length > 0 && (
            <div className="px-5 pt-4 pb-6">
              <p className="text-xs font-medium text-stone-500 uppercase tracking-wider mb-3">Variations</p>
              <div className="space-y-3">
                {pose.variations.map((v) => (
                  <div key={v.id} className="border border-stone-100 rounded-xl p-3">
                    <p className="text-sm font-medium text-terra-600 mb-1.5">{v.name || 'Unnamed variation'}</p>
                    {v.cues.length > 0 ? (
                      <ul className="space-y-1.5">
                        {v.cues.map((c,i) => (
                          <li key={i} className="flex gap-2 text-xs text-stone-600">
                            <span className="w-1 h-1 rounded-full bg-terra-300 shrink-0 mt-1.5" />
                            {c}
                          </li>
                        ))}
                      </ul>
                    ) : <p className="text-xs text-stone-400 italic">No cues</p>}

              </div>

          )}

        <div className="px-5 py-4 border-t border-stone-100">
          <Btn variant="primary" size="sm" className="w-full justify-center" onClick={onEdit}>{Icon.edit} Edit Pose</Btn>
        </div>
      </div>
    </div>
  );
}

// ─── Poses Page ───────────────────────────────────────────────────────────────
function PosesPage() {
  const { poses, addPose, updatePose, deletePose } = useApp();
  const [q, setQ] = useState('');
  const [catFilter, setCatFilter] = useState([]);
  const [showForm, setShowForm] = useState(false);
  const [editing, setEditing] = useState(null);
  const [detail, setDetail] = useState(null);
  const [delId, setDelId] = useState(null);

  const filtered = useMemo(() =>
    poses.filter(p => {
      if (!p.name.toLowerCase().includes(q.toLowerCase())) return false;
      if (catFilter.length > 0 && !catFilter.some(c => p.categories?.includes(c))) return false;
      return true;
    }),
    [poses, q, catFilter]
  );

  const handleSave = (pose) => {
    if (editing) updatePose(pose); else addPose(pose);
    setShowForm(false); setEditing(null);
  };
  const handleDelete = (id) => {
    deletePose(id); setDelId(null);
    if (detail?.id === id) setDetail(null);
  };

  return (
    <div className="flex-1 overflow-auto p-6">
      <div className="flex items-center gap-3 mb-3">
        <div className="relative flex-1 max-w-xs">
          <span className="absolute left-3 top-1/2 -translate-y-1/2 text-stone-400">{Icon.search}</span>
          <input value={q} onChange={(e)=>setQ(e.target.value)} placeholder="Search poses…"
            className="w-full pl-9 pr-4 py-2 border border-stone-200 rounded-xl text-sm focus:border-sage-400 focus:ring-2 focus:ring-sage-100 transition-all" />
        </div>
        <Btn variant="primary" onClick={()=>{ setEditing(null); setShowForm(true); }}>{Icon.plus} New Pose</Btn>
      </div>
      <div className="flex flex-wrap gap-1.5 mb-5">
        {POSE_CATEGORIES.map(cat => (
          <button key={cat} type="button" onClick={() => setCatFilter(f => f.includes(cat) ? f.filter(c=>c!==cat) : [...f, cat])}
            className={`px-2.5 py-1 rounded-lg text-xs font-medium transition-all ${
              catFilter.includes(cat) ? 'bg-sage-500 text-white shadow-sm' : 'bg-stone-100 text-stone-500 hover:bg-stone-200'
            }`}>
            {cat}
          </button>
        ))}
        {catFilter.length > 0 && (
          <button type="button" onClick={() => setCatFilter([])} className="px-2.5 py-1 rounded-lg text-xs font-medium text-stone-400 hover:text-red-400 transition-colors">✕ clear</button>
        )}
      </div>

      {filtered.length === 0 ? (
        <div className="flex flex-col items-center justify-center py-20 text-center">
          <div className="mb-4 text-stone-300">{Icon.img}</div>
          <p className="font-display text-xl text-stone-400 mb-2">{q ? 'No poses found' : 'No poses yet'}</p>
          <p className="text-sm text-stone-400 mb-5">{q ? 'Try a different search' : 'Add your first pose to get started'}</p>
          {!q && <Btn variant="primary" onClick={()=>setShowForm(true)}>{Icon.plus} Add Pose</Btn>}
        </div>
      ) : (
        <div className="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-4">
          {filtered.map(p => (
            <div key={p.id} className="bg-white rounded-2xl shadow-sm border border-stone-100 overflow-hidden hover:shadow-md hover:border-sage-200 transition-all group cursor-pointer"
              onClick={()=>setDetail(p)}>
              <div className="aspect-[4/3] bg-sage-50">
                <PoseImg src={p.imageUrl} alt={p.name} />
              </div>
              <div className="p-3">
                <div className="flex items-start gap-1.5 mb-1">
                  <p className="font-display text-sm font-semibold text-stone-800 truncate flex-1">{p.name}</p>
                  {p.isSided && <span className="shrink-0 text-xs bg-sage-100 text-sage-700 px-1.5 py-0.5 rounded font-medium">L/R</span>}
                </div>
                {p.categories?.length > 0 && (
                  <div className="flex flex-wrap gap-1 mb-1.5">
                    {p.categories.slice(0,3).map(cat => (
                      <span key={cat} className="text-xs bg-stone-100 text-stone-500 px-1.5 py-0.5 rounded">{cat}</span>
                    ))}
                    {p.categories.length > 3 && <span className="text-xs text-stone-400">+{p.categories.length-3}</span>}
                  </div>
                )}
                {p.cues.slice(0,1).map((c,i)=>(
                  <p key={i} className="text-xs text-stone-500 truncate leading-relaxed">{c}</p>
                ))}
              </div>
              <div className="px-3 pb-3 flex gap-2 opacity-0 group-hover:opacity-100 transition-opacity" onClick={(e)=>e.stopPropagation()}>
                <Btn variant="ghost" size="xs" onClick={()=>{ setEditing(p); setShowForm(true); }}>{Icon.edit}</Btn>
                <Btn variant="ghost" size="xs" onClick={()=>setDelId(p.id)} className="hover:text-red-400">{Icon.trash}</Btn>
              </div>
            </div>
          ))}
        </div>
      )}

      {(showForm || editing) && (
        <PoseFormModal pose={editing} onSave={handleSave} onClose={()=>{ setShowForm(false); setEditing(null); }} />
      )}
      {detail && !showForm && !editing && (
        <PoseDetailDrawer pose={detail} onClose={()=>setDetail(null)} onEdit={()=>{ setEditing(detail); setShowForm(true); setDetail(null); }} />
      )}
      {delId && (
        <ConfirmDialog message="Delete this pose? It will be removed from any sequences that use it."
          onConfirm={()=>handleDelete(delId)} onCancel={()=>setDelId(null)} />
      )}
    </div>
  );
}

// ─── Side Toggle ─────────────────────────────────────────────────────────────
function SideToggle({ value, onChange }) {
  return (
    <div className="flex items-center gap-2">
      <span className="text-xs font-medium text-stone-400 uppercase tracking-wider">Side:</span>
      <div className="flex gap-1">
        {[['right','Right ▶'],['left','◀ Left']].map(([v, label]) => (
          <button key={v} type="button" onClick={() => onChange(v === value ? '' : v)}
            className={`px-2.5 py-1 rounded-md text-xs font-medium transition-all ${
              value === v ? 'bg-sage-600 text-white shadow-sm' : 'bg-stone-100 text-stone-500 hover:bg-stone-200'
            }`}>
            {label}
          </button>
        ))}
      </div>
      {!value && <span className="text-xs text-amber-500 font-medium">— set a side</span>}
    </div>
  );
}

// ─── Cue Selector (class mode — pick up to 3 from pose library) ───────────────
function CueSelector({ selected, allCues, onChange }) {
  const MAX = 3;
  const toggle = (cue) => {
    if (selected.includes(cue)) onChange(selected.filter(c => c !== cue));
    else if (selected.length < MAX) onChange([...selected, cue]);
  };
  if (allCues.length === 0) return <p className="text-xs text-stone-400 italic">No cues in pose library — add some via Edit Pose.</p>;
  return (
    <div className="space-y-1.5">
      <p className="text-xs text-stone-400 mb-2">Choose up to 3 cues to show in this class <span className="font-medium text-stone-500">({selected.length}/{MAX} selected)</span></p>
      {allCues.map((cue, i) => {
        const on = selected.includes(cue);
        const disabled = !on && selected.length >= MAX;
        return (
          <button key={i} type="button" onClick={() => toggle(cue)} disabled={disabled}
            className={`w-full text-left text-xs px-3 py-2 rounded-lg transition-all flex items-start gap-2.5 border ${
              on ? 'bg-sage-50 border-sage-300 text-sage-800' :
              disabled ? 'border-stone-100 text-stone-300 bg-stone-50 cursor-not-allowed' :
              'border-stone-200 text-stone-600 bg-white hover:border-sage-200 hover:bg-sage-50'
            }`}>
            <span className={`mt-0.5 w-3.5 h-3.5 rounded border flex-shrink-0 flex items-center justify-center transition-colors ${
              on ? 'bg-sage-500 border-sage-500' : 'border-stone-300'
            }`}>
              {on && <svg viewBox="0 0 10 10" fill="none" stroke="white" strokeWidth="1.8" className="w-2.5 h-2.5"><polyline points="1.5,5 4,7.5 8.5,2"/></svg>}
            </span>
            <span className="leading-relaxed">{cue}</span>
          </button>
        );
      })}
    </div>
  );
}

// ─── Category Filter ─────────────────────────────────────────────────────────
function CategoryFilter({ selected, onChange }) {
  const { customCategories } = useApp();
  const allCats = [...POSE_CATEGORIES, ...customCategories];
  const toggle = (cat) => onChange(
    selected.includes(cat) ? selected.filter(c => c !== cat) : [...selected, cat]
  );
  return (
    <div className="flex flex-wrap gap-1 px-2 py-2 border-b border-stone-100">
      {allCats.map(cat => (
        <button key={cat} type="button" onClick={() => toggle(cat)}
          className={`px-1.5 py-0.5 rounded text-xs font-medium transition-all leading-tight ${
            selected.includes(cat)
              ? 'bg-sage-500 text-white shadow-sm'
              : 'bg-stone-100 text-stone-500 hover:bg-stone-200'
          }`}>
          {cat}
        </button>
      ))}
      {selected.length > 0 && (
        <button type="button" onClick={() => onChange([])}
          className="px-1.5 py-0.5 rounded text-xs font-medium text-stone-400 hover:text-red-400 transition-colors">
          ✕ clear
        </button>
      )}
    </div>
  );
}

// ─── Category Chip Editor (editing context — includes custom + add-new) ───────
function CategoryChipEditor({ selected, onChange }) {
  const { customCategories, addCustomCategory } = useApp();
  const allCats = [...POSE_CATEGORIES, ...customCategories];
  const [newCat, setNewCat] = useState('');
  const toggle = (cat) => onChange(
    selected.includes(cat) ? selected.filter(c => c !== cat) : [...selected, cat]
  );
  const addNew = () => {
    const trimmed = newCat.trim();
    if (!trimmed) return;
    addCustomCategory(trimmed);
    if (!selected.includes(trimmed)) onChange([...selected, trimmed]);
    setNewCat('');
  };
  return (
    <div className="space-y-2">
      <div className="flex flex-wrap gap-1.5">
        {allCats.map(cat => (
          <button key={cat} type="button" onClick={() => toggle(cat)}
            className={`px-2.5 py-1 rounded-lg text-xs font-medium transition-all ${
              selected.includes(cat)
                ? 'bg-sage-500 text-white shadow-sm'
                : 'bg-stone-100 text-stone-500 hover:bg-stone-200'
            }`}>
            {cat}
          </button>
        ))}
      </div>
      <div className="flex gap-2">
        <input value={newCat} onChange={e => setNewCat(e.target.value)}
          onKeyDown={e => e.key === 'Enter' && (e.preventDefault(), addNew())}
          placeholder="Add custom category…"
          className="flex-1 text-xs border border-stone-200 rounded-lg px-3 py-1.5 focus:border-sage-400 focus:ring-1 focus:ring-sage-100 transition-all" />
        <Btn variant="secondary" size="xs" onClick={addNew} disabled={!newCat.trim()}>{Icon.plus} Add</Btn>
      </div>
    </div>
  );
}

// ─── Transition Cue Editor ────────────────────────────────────────────────────
function TransitionCueEditor({ cues, onChange }) {
  const addStep = () => onChange([...cues, { text: '', breath: '' }]);
  const update = (i, field, val) => onChange(cues.map((c, j) => j === i ? { ...c, [field]: val } : c));
  const remove = (i) => onChange(cues.filter((_, j) => j !== i));
  return (
    <div className="space-y-2">
      {cues.map((cue, i) => (
        <div key={i} className="flex items-start gap-2 group">
          <div className="flex-1 space-y-1">
            <input value={cue.text} onChange={(e) => update(i, 'text', e.target.value)}
              placeholder="Movement cue…"
              className="w-full text-sm border border-stone-200 rounded-lg px-3 py-1.5 focus:border-terra-300 focus:ring-1 focus:ring-terra-50 transition-all" />
            <div className="flex items-center gap-1.5">
              <span className="text-xs text-stone-400">Breath:</span>
              <BreathToggle value={cue.breath} onChange={(v) => update(i, 'breath', v)} />
            </div>
          </div>
          <button onClick={() => remove(i)} className="mt-1.5 text-stone-300 hover:text-red-400 transition-colors p-1 rounded opacity-0 group-hover:opacity-100">{Icon.x}</button>
        </div>
      ))}
      <button onClick={addStep}
        className="flex items-center gap-1.5 text-xs text-terra-500 hover:text-terra-700 font-medium transition-colors py-1">
        {Icon.plus} Add cue step
      </button>
    </div>
  );
}

// ─── Transition Slot ──────────────────────────────────────────────────────────
function TransitionSlot({ transition, onTransitionChange, onSaveToLibrary }) {
  const t = transition || emptyTransition();
  const { enabled, cues } = t;
  return (
    <div className="mx-4 py-3 border-t border-dashed border-stone-200 space-y-2">
      <div className="flex items-center justify-between">
        <div className="flex items-center gap-2">
          <div className="w-4 h-4 rounded-full bg-terra-100 flex items-center justify-center shrink-0">
            <div className="w-1.5 h-1.5 rounded-full bg-terra-400" />
          </div>
          <p className="text-xs font-medium text-stone-400 uppercase tracking-wider">Transition</p>
        </div>
        <button type="button" onClick={() => onTransitionChange({ ...t, enabled: !enabled })}
          className={`text-xs px-2 py-0.5 rounded-md font-medium transition-all ${enabled ? 'bg-terra-100 text-terra-600 hover:bg-terra-200' : 'bg-stone-100 text-stone-400 hover:bg-stone-200'}`}>
          {enabled ? 'On' : 'Off'}
        </button>
      </div>
      {enabled && (
        <>
          <TransitionCueEditor cues={cues} onChange={(v) => onTransitionChange({ ...t, cues: v })} />
          {cues.length > 0 && onSaveToLibrary && (
            <button type="button" onClick={() => onSaveToLibrary(cues)}
              className="flex items-center gap-1.5 text-xs text-stone-400 hover:text-sage-600 font-medium transition-colors py-0.5">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="w-3.5 h-3.5"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
              Save to transition library
            </button>
          )}
        </>
      )}
    </div>
  );
}

// ─── Sequence Item Row (shared) ───────────────────────────────────────────────
function SeqItemRow({ item, pose, index, total, onChange, onRemove, onDragStart, onDrop, isLast, classMode, onSaveTransitionToLibrary }) {
  const [open, setOpen] = useState(!classMode);
  if (!pose) return null;
  const sideLabel = item.side === 'right' ? 'Right' : item.side === 'left' ? 'Left' : null;
  const transition = item.transition || emptyTransition();
  const activeVariation = item.variationId ? (pose.variations || []).find(v => v.id === item.variationId) : null;
  // Cues pool: in classMode, use variation cues as allCues when a variation is selected
  const allCues = activeVariation ? activeVariation.cues : pose.cues;
  return (
    <div draggable onDragStart={()=>onDragStart(index)} onDragOver={(e)=>{e.preventDefault();}} onDrop={()=>onDrop(index)}
      className="bg-white rounded-xl border border-stone-200 overflow-hidden shadow-sm hover:shadow-md transition-shadow">
      <div className="flex items-center gap-3 px-3 py-2.5 bg-sage-50/60">
        <span className="cursor-grab text-stone-300 hover:text-stone-500" title="Drag to reorder">{Icon.drag}</span>
        <div className="w-8 h-8 rounded-lg overflow-hidden bg-sage-100 shrink-0">
          <PoseImg src={pose.imageUrl} alt={pose.name} className="w-full h-full object-cover" />
        </div>
        <div className="flex-1 min-w-0">
          <span className="font-medium text-sm text-stone-800 truncate block">
            {pose.name}
            {activeVariation && <span className="text-terra-600"> · {activeVariation.name}</span>}
          </span>
          {sideLabel && <span className="text-xs text-sage-600 font-medium">{sideLabel} side</span>}
          {pose.isSided && !sideLabel && <span className="text-xs text-amber-500 font-medium">Side not set</span>}
        </div>
        <span className="text-xs text-stone-400 bg-white px-2 py-0.5 rounded-full border border-stone-100 shrink-0">{index+1}</span>
        <button onClick={()=>setOpen(!open)} className="text-stone-400 hover:text-stone-600 transition-colors">{Icon.chevDown}</button>
        <button onClick={onRemove} className="text-stone-300 hover:text-red-400 transition-colors ml-1">{Icon.x}</button>
      </div>

      {open && (
        <div className="px-4 py-3 space-y-3 border-t border-stone-100">
          {pose.isSided && (
            <SideToggle value={item.side || ''} onChange={(v) => onChange({...item, side: v})} />
          )}
          {(pose.variations || []).length > 0 && (
            <div>
              <p className="text-xs font-medium text-stone-400 uppercase tracking-wider mb-2">Variation</p>
              <div className="flex flex-wrap gap-1.5">
                <button type="button"
                  onClick={() => onChange({...item, variationId: null, cues: classMode ? [] : [...pose.cues]})}
                  className={`px-2.5 py-1 rounded-lg text-xs font-medium transition-all ${!item.variationId ? 'bg-sage-500 text-white shadow-sm' : 'bg-stone-100 text-stone-500 hover:bg-stone-200'}`}>
                  Base pose
                </button>
                {(pose.variations || []).map(v => (
                  <button key={v.id} type="button"
                    onClick={() => onChange({...item, variationId: v.id, cues: classMode ? [] : [...v.cues]})}
                    className={`px-2.5 py-1 rounded-lg text-xs font-medium transition-all ${item.variationId === v.id ? 'bg-terra-500 text-white shadow-sm' : 'bg-stone-100 text-stone-500 hover:bg-stone-200'}`}>
                    {v.name || 'Unnamed variation'}
                  </button>
                ))}
              </div>
            </div>
          )}
          <div>
            <p className="text-xs font-medium text-stone-400 uppercase tracking-wider mb-2">
              {classMode ? 'Class cues' : 'Cues for this pose'}
            </p>
            {classMode
              ? <CueSelector selected={item.cues} allCues={allCues} onChange={(v) => onChange({...item, cues: v})} />
              : <CueList cues={item.cues} onChange={(v)=>onChange({...item, cues:v})} />
            }
          </div>
        </div>
      )}

      {!isLast && (
        <TransitionSlot
          transition={transition}
          onTransitionChange={(t) => onChange({...item, transition: t})}
          onSaveToLibrary={onSaveTransitionToLibrary}
        />
      )}
    </div>
  );
}

// ─── Sequence Viewer ──────────────────────────────────────────────────────────
function SequenceViewer({ title, steps, onClose }) {
  // steps: [{pose, cues, side, transition:{enabled,cues:[{text,breath}]}, groupName?, isSection?, sectionName?}]
  const [idx, setIdx] = useState(0);
  useEffect(() => {
    const fn = (e) => {
      if (e.key === 'ArrowLeft') setIdx(i => Math.max(0, i-1));
      if (e.key === 'ArrowRight') setIdx(i => Math.min(steps.length-1, i+1));
      if (e.key === 'Escape') onClose();
    };
    document.addEventListener('keydown', fn);
    return () => document.removeEventListener('keydown', fn);
  }, [steps.length, onClose]);
  const step = steps[idx];
  if (!step) return null;
  const transCues = (step.transition?.enabled && step.transition?.cues?.length > 0) ? step.transition.cues : [];

  // Dot nav: group consecutive section+poses for context
  const sectionOfIdx = (() => {
    let name = null;
    for (let i = 0; i <= idx; i++) { if (steps[i].isSection) name = steps[i].sectionName; }
    return name;
  })();

  if (step.isSection) {
    return (
      <div className="fixed inset-0 z-50 bg-stone-900/95 flex flex-col items-center justify-center fade-in">
        <div className="absolute top-4 right-4">
          <button onClick={onClose} className="p-2 rounded-xl text-white/60 hover:text-white hover:bg-white/10 transition-all">{Icon.x}</button>
        </div>
        <p className="font-display text-stone-500 text-xs mb-6 uppercase tracking-widest">{title}</p>
        <div className="w-16 h-0.5 bg-sage-700 mb-8 rounded-full" />
        <h2 className="font-display text-5xl text-white mb-4 text-center px-8">{step.sectionName}</h2>
        <div className="w-16 h-0.5 bg-sage-700 mt-4 mb-10 rounded-full" />
        <button onClick={()=>setIdx(i=>Math.min(steps.length-1,i+1))} disabled={idx===steps.length-1}
          className="flex items-center gap-2 px-6 py-3 rounded-xl bg-sage-600 hover:bg-sage-700 text-white transition-all text-sm font-medium shadow-lg">
          Begin {Icon.chevRight}
        </button>
        <p className="text-stone-600 text-xs mt-8">← → arrow keys · Esc to close</p>
      </div>
    );
  }

  return (
    <div className="fixed inset-0 z-50 bg-stone-900/95 flex flex-col fade-in">
      {/* Fixed top */}
      <div className="flex-none flex flex-col items-center pt-5 pb-3 px-12 relative">
        <button onClick={onClose} className="absolute right-4 top-4 p-2 rounded-xl text-white/60 hover:text-white hover:bg-white/10 transition-all">{Icon.x}</button>
        <p className="font-display text-stone-400 text-sm uppercase tracking-widest mb-1">{title}</p>
        <div className="flex items-center gap-2">
          {sectionOfIdx && <span className="px-2.5 py-0.5 bg-stone-700 text-stone-300 text-xs rounded-full">{sectionOfIdx}</span>}
          <p className="text-stone-500 text-xs">Step {idx+1} of {steps.length}</p>
        </div>
      </div>
      {/* Scrollable content */}
      <div className="flex-1 overflow-y-auto flex flex-col items-center px-6 pt-4 pb-4 min-h-0">
        {step.groupName && (
          <span className="mb-3 px-3 py-1 bg-sage-800/40 text-sage-300 text-xs rounded-full border border-sage-700/40">{step.groupName}</span>
        )}
        <div className="w-56 h-56 rounded-3xl overflow-hidden bg-stone-800 shadow-2xl mb-5 shrink-0">
          <PoseImg src={step.pose.imageUrl} alt={step.pose.name} />
        </div>
        <h2 className="font-display text-3xl text-white mb-1 text-center">{step.pose.name}</h2>
        {step.variationName && (
          <p className="text-terra-300 text-sm font-medium mb-1 text-center">{step.variationName}</p>
        )}
        {step.side
          ? <span className={`mb-4 px-3 py-1 text-xs font-semibold rounded-full uppercase tracking-wider ${step.side==='right' ? 'bg-sage-700/60 text-sage-200' : 'bg-terra-800/60 text-terra-200'}`}>
              {step.side === 'right' ? '▶ Right side' : '◀ Left side'}
            </span>
          : <div className="mb-4" />
        }
        {step.cues.length > 0 && (
          <ul className="mb-4 space-y-2 text-center w-full max-w-xs">
            {step.cues.map((c,i)=>(
              <li key={i} className="text-stone-300 text-sm flex items-start gap-2 justify-center">
                <span className="w-1 h-1 rounded-full bg-sage-400 shrink-0 mt-1.5" />{c}
              </li>
            ))}
          </ul>
        )}
      </div>
      {/* Fixed bottom — transition + nav */}
      <div className="flex-none flex flex-col items-center gap-3 pt-3 pb-5 border-t border-white/5">
        {/* Transition block — always rendered to hold space; visible only when content exists */}
        <div className={`w-full max-w-xs mx-auto px-5 py-3 rounded-2xl text-center transition-all ${
          idx < steps.length-1 && transCues.length > 0
            ? 'bg-terra-900/40 border border-terra-700/30'
            : 'opacity-0 pointer-events-none'
        }`} style={{minHeight:'52px'}}>
          {transCues.map((cue, ci) => (
            <div key={ci} className={ci > 0 ? 'mt-2' : ''}>
              {cue.breath === 'in' && <p className="text-terra-300 text-xs font-medium uppercase tracking-widest mb-0.5">↑ Inhale</p>}
              {cue.breath === 'out' && <p className="text-terra-300 text-xs font-medium uppercase tracking-widest mb-0.5">↓ Exhale</p>}
              {cue.text && <p className="text-terra-200 text-sm">{cue.text}</p>}
            </div>
          ))}
        </div>
        <div className="flex items-center gap-4">
          <button onClick={()=>setIdx(i=>Math.max(0,i-1))} disabled={idx===0}
            className="flex items-center gap-2 px-4 py-2.5 rounded-xl bg-white/10 hover:bg-white/20 text-white disabled:opacity-30 transition-all text-sm font-medium w-24 justify-center">
            {Icon.chevLeft} Prev
          </button>
          <div className="flex gap-1 max-w-[200px] flex-wrap justify-center">
            {steps.map((s,i)=>(
              <button key={i} onClick={()=>setIdx(i)}
                className={`transition-all rounded-full ${s.isSection ? 'w-3 h-1.5 bg-stone-500 hover:bg-stone-400' : i===idx ? 'w-4 h-2 bg-sage-400' : 'w-2 h-2 bg-stone-600 hover:bg-stone-500'}`} />
            ))}
          </div>
          <button onClick={()=>setIdx(i=>Math.min(steps.length-1,i+1))} disabled={idx===steps.length-1}
            className="flex items-center gap-2 px-4 py-2.5 rounded-xl bg-white/10 hover:bg-white/20 text-white disabled:opacity-30 transition-all text-sm font-medium w-24 justify-center">
            Next {Icon.chevRight}
          </button>
        </div>
        <p className="text-stone-600 text-xs">← → arrow keys · Esc to close</p>
      </div>
    </div>
  );
}

// ─── Vinyette Form Modal ──────────────────────────────────────────────────────
function VinyetteFormModal({ vinyette, onSave, onClose }) {
  const { poses, transitions, saveTransitionToLibrary, addPose: ctxAddPose, updatePose: ctxUpdatePose } = useApp();
  const [name, setName] = useState(vinyette?.name || '');
  const [items, setItems] = useState(vinyette?.items ? vinyette.items.map(i=>({...i, cues:[...i.cues], transition: i.transition ? {...i.transition, cues:[...( i.transition.cues||[])]} : emptyTransition()})) : []);
  const [q, setQ] = useState('');
  const [catFilter, setCatFilter] = useState([]);
  const [expandedPoses, setExpandedPoses] = useState({});
  const [quickAddVariationFor, setQuickAddVariationFor] = useState(null); // poseId
  const [quickVarName, setQuickVarName] = useState('');
  const [showQuickAdd, setShowQuickAdd] = useState(false);
  const [quickAddName, setQuickAddName] = useState('');
  const [quickAddSided, setQuickAddSided] = useState(false);
  const { onDragStart, onDrop } = useDragSort(items, setItems);

  const hasSidedItems = items.some(it => { const p = poses.find(x=>x.id===it.poseId); return p?.isSided; });

  const filtered = useMemo(() =>
    poses.filter(p => {
      if (!p.name.toLowerCase().includes(q.toLowerCase())) return false;
      if (catFilter.length > 0 && !catFilter.some(c => p.categories?.includes(c))) return false;
      return true;
    }),
    [poses, q, catFilter]
  );

  const addPoseToSeq = (pose, variationId = null) => {
    const variation = variationId ? (pose.variations || []).find(v => v.id === variationId) : null;
    setItems(it => {
      const prevPoseId = it.length > 0 ? it[it.length-1].poseId : null;
      const match = lookupTransition(transitions, prevPoseId, pose.id);
      const transition = match
        ? { libraryId: match.id, cues: match.cues.map(c=>({...c})), enabled: true }
        : emptyTransition();
      return [...it, { poseId: pose.id, variationId: variationId || null, cues: variation ? [...variation.cues] : [...pose.cues], side: '', transition }];
    });
  };
  // Legacy: picker button clicks (no variation)
  const addPose = (pose) => addPoseToSeq(pose, null);

  const submitQuickVariation = (pose) => {
    if (!quickVarName.trim()) return;
    const newVariation = { id: uid(), name: quickVarName.trim(), cues: [] };
    const updatedPose = { ...pose, variations: [...(pose.variations || []), newVariation] };
    ctxUpdatePose(updatedPose);
    addPoseToSeq(updatedPose, newVariation.id);
    setQuickAddVariationFor(null);
    setQuickVarName('');
  };

  const submitQuickAdd = () => {
    if (!quickAddName.trim()) return;
    const newPose = { id: uid(), name: quickAddName.trim(), description: '', imageUrl: '', isSided: quickAddSided, categories: [], cues: [], variations: [] };
    ctxAddPose(newPose);
    addPoseToSeq(newPose, null);
    setShowQuickAdd(false);
    setQuickAddName('');
    setQuickAddSided(false);
  };

  const mirrorItems = () => setItems(it => it.map(item => ({ ...item, side: flipSide(item.side || '') })));
  const save = () => {
    if (!name.trim()) return;
    onSave({ ...vinyette, id: vinyette?.id || uid(), name: name.trim(), items });
  };

  return (
    <Modal title={vinyette ? 'Edit Vinyette' : 'New Vinyette'} onClose={onClose} wide>
      <div className="flex flex-col h-full" style={{minHeight:'60vh'}}>
        <div className="px-6 py-4 border-b border-stone-100">
          <input value={name} onChange={(e)=>setName(e.target.value)} placeholder="Vinyette name…"
            className="w-full text-lg font-display border border-stone-200 rounded-xl px-4 py-2.5 focus:border-sage-400 focus:ring-2 focus:ring-sage-100 transition-all" />
        </div>
        <div className="flex flex-1 overflow-hidden" style={{minHeight:'400px'}}>
          {/* Pose picker */}
          <div className="w-56 border-r border-stone-100 flex flex-col shrink-0">
            <div className="p-3 border-b border-stone-100">
              <div className="relative">
                <span className="absolute left-2.5 top-1/2 -translate-y-1/2 text-stone-400">{Icon.search}</span>
                <input value={q} onChange={(e)=>setQ(e.target.value)} placeholder="Search…"
                  className="w-full pl-8 pr-3 py-1.5 text-sm border border-stone-200 rounded-lg focus:border-sage-300 focus:ring-1 focus:ring-sage-100 transition-all" />
              </div>
            </div>
            <CategoryFilter selected={catFilter} onChange={setCatFilter} />
            <div className="flex-1 overflow-auto scrollbar-thin p-2 space-y-0.5">
              {filtered.length === 0 && <p className="text-xs text-stone-400 p-2 text-center">No poses found</p>}
              {filtered.map(p => {
                const hasVariations = (p.variations || []).length > 0;
                const isExpanded = !!expandedPoses[p.id];
                const isAddingVariation = quickAddVariationFor === p.id;
                return (
                  <div key={p.id}>
                    <div className="flex items-center gap-2 px-2 py-1.5 rounded-lg hover:bg-sage-50 transition-colors group">
                      <div className="w-8 h-8 rounded-md overflow-hidden bg-sage-100 shrink-0 cursor-pointer" onClick={()=>addPose(p)}>
                        <PoseImg src={p.imageUrl} alt={p.name} className="w-full h-full object-cover" />
                      </div>
                      <span className="flex-1 text-sm text-stone-700 truncate group-hover:text-sage-700 cursor-pointer" onClick={()=>addPose(p)}>{p.name}</span>
                      {hasVariations && (
                        <button type="button" onClick={()=>setExpandedPoses(e=>({...e,[p.id]:!e[p.id]}))}
                          className={`text-stone-300 hover:text-stone-500 transition-all shrink-0 ${isExpanded ? '' : '-rotate-90'}`}>
                          {Icon.chevDown}
                        </button>
                      )}
                      <span className="text-stone-300 group-hover:text-sage-400 shrink-0 cursor-pointer" onClick={()=>addPose(p)}>{Icon.plus}</span>
                    </div>
                    {isExpanded && (
                      <div className="ml-3 border-l border-stone-100 pl-2 space-y-0.5 mb-0.5">
                        {(p.variations || []).map(v => (
                          <button key={v.id} type="button" onClick={()=>addPoseToSeq(p, v.id)}
                            className="w-full flex items-center gap-2 px-2 py-1.5 rounded-lg hover:bg-terra-50 text-left transition-colors group/v">
                            <div className="w-5 h-5 rounded bg-terra-100 flex items-center justify-center text-terra-400 shrink-0 text-xs font-bold">V</div>
                            <span className="flex-1 text-xs text-stone-600 truncate group-hover/v:text-terra-700">{v.name || 'Unnamed'}</span>
                            <span className="text-stone-300 group-hover/v:text-terra-400 shrink-0">{Icon.plus}</span>
                          </button>
                        ))}
                        {isAddingVariation ? (
                          <div className="px-1 py-1.5 space-y-1.5">
                            <input autoFocus value={quickVarName} onChange={e=>setQuickVarName(e.target.value)}
                              onKeyDown={e=>{if(e.key==='Enter')submitQuickVariation(p);if(e.key==='Escape'){setQuickAddVariationFor(null);setQuickVarName('');}}}
                              placeholder="Variation name…"
                              className="w-full text-xs border border-terra-200 rounded-lg px-2.5 py-1.5 focus:border-terra-400 focus:ring-1 focus:ring-terra-50 transition-all" />
                            <div className="flex gap-1.5">
                              <Btn size="xs" variant="terra" onClick={()=>submitQuickVariation(p)} disabled={!quickVarName.trim()}>Add</Btn>
                              <button onClick={()=>{setQuickAddVariationFor(null);setQuickVarName('');}} className="text-stone-400 hover:text-stone-600 p-1">{Icon.x}</button>
                            </div>
                          </div>
                        ) : (
                          <button type="button" onClick={()=>{setQuickAddVariationFor(p.id);setQuickVarName('');}}
                            className="w-full flex items-center gap-1.5 px-2 py-1.5 text-xs text-stone-400 hover:text-terra-600 transition-colors">
                            {Icon.plus} New variation…
                          </button>
                        )}
                      </div>
                    )}
                  </div>
                );
              })}
            </div>
            {/* Quick add new pose */}
            <div className="border-t border-stone-100">
              {showQuickAdd ? (
                <div className="p-2.5 space-y-2 bg-stone-50">
                  <p className="text-xs font-medium text-stone-500">New pose</p>
                  <input autoFocus value={quickAddName} onChange={e=>setQuickAddName(e.target.value)}
                    onKeyDown={e=>{if(e.key==='Enter')submitQuickAdd();if(e.key==='Escape'){setShowQuickAdd(false);setQuickAddName('');}}}
                    placeholder="Pose name…"
                    className="w-full text-sm border border-stone-200 rounded-lg px-3 py-1.5 focus:border-sage-400 focus:ring-1 focus:ring-sage-100 transition-all" />
                  <div className="flex items-center gap-2">
                    <button type="button" onClick={()=>setQuickAddSided(s=>!s)}
                      className={`px-2 py-0.5 rounded text-xs font-medium transition-all ${quickAddSided ? 'bg-sage-500 text-white' : 'bg-stone-100 text-stone-500'}`}>L/R</button>
                    <span className="text-xs text-stone-400">One-sided</span>
                  </div>
                  <div className="flex gap-1.5">
                    <Btn size="xs" variant="primary" onClick={submitQuickAdd} disabled={!quickAddName.trim()} className="flex-1 justify-center">Add to sequence</Btn>
                    <button onClick={()=>{setShowQuickAdd(false);setQuickAddName('');}} className="text-stone-400 hover:text-stone-600 p-1">{Icon.x}</button>
                  </div>
                </div>
              ) : (
                <button onClick={()=>setShowQuickAdd(true)}
                  className="w-full flex items-center gap-2 px-3 py-2.5 text-xs text-stone-400 hover:text-sage-600 hover:bg-stone-50 transition-colors">
                  {Icon.plus} New pose…
                </button>
              )}
            </div>
          </div>
          {/* Sequence */}
          <div className="flex-1 overflow-auto scrollbar-thin p-4 space-y-3">
            {items.length === 0 && (
              <div className="flex flex-col items-center justify-center py-16 text-center text-stone-400">
                <p className="font-display text-lg mb-1">No poses yet</p>
                <p className="text-sm">Click poses on the left to add them</p>
              </div>
            )}
            {items.map((item, i) => {
              const pose = poses.find(p=>p.id===item.poseId);
              const nextItem = items[i+1];
              const nextPoseId = nextItem?.poseId || null;
              return (
                <SeqItemRow key={i} item={item} pose={pose} index={i} total={items.length}
                  isLast={i===items.length-1}
                  onChange={(v)=>setItems(it=>it.map((x,j)=>j===i?v:x))}
                  onRemove={()=>setItems(it=>it.filter((_,j)=>j!==i))}
                  onDragStart={onDragStart} onDrop={onDrop}
                  onSaveTransitionToLibrary={(cues) => saveTransitionToLibrary(nextPoseId, cues)}
                />
              );
            })}
          </div>
        </div>
        <div className="px-6 py-4 border-t border-stone-100 flex items-center justify-between gap-3">
          <div>
            {hasSidedItems && items.length > 0 && (
              <Btn variant="secondary" size="sm" onClick={mirrorItems}>
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="w-4 h-4"><path d="M8 3H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h3"/><path d="M16 3h3a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-3"/><line x1="12" y1="3" x2="12" y2="21"/></svg>
                Mirror L↔R
              </Btn>
            )}
          </div>
          <div className="flex gap-3">
            <Btn variant="secondary" onClick={onClose}>Cancel</Btn>
            <Btn variant="primary" onClick={save} disabled={!name.trim()}>Save Vinyette</Btn>
          </div>
        </div>
      </div>
    </Modal>
  );
}

// ─── Vinyettes Page ───────────────────────────────────────────────────────────
function VinyettesPage() {
  const { poses, vinyettes, addVinyette, updateVinyette, deleteVinyette } = useApp();
  const [q, setQ] = useState('');
  const [showForm, setShowForm] = useState(false);
  const [editing, setEditing] = useState(null);
  const [viewing, setViewing] = useState(null);
  const [delId, setDelId] = useState(null);

  const filtered = useMemo(() =>
    vinyettes.filter(v => v.name.toLowerCase().includes(q.toLowerCase())),
    [vinyettes, q]
  );
  const handleSave = (v) => {
    if (editing) updateVinyette(v); else addVinyette(v);
    setShowForm(false); setEditing(null);
  };
  const viewSteps = (v) => {
    const steps = v.items.map((item) => {
      const pose = poses.find(p=>p.id===item.poseId);
      if (!pose) return null;
      const variation = item.variationId ? (pose.variations||[]).find(vr=>vr.id===item.variationId) : null;
      return {
        pose,
        variationName: variation?.name || null,
        cues: item.cues,
        side: item.side||'',
        transition: item.transition || emptyTransition(),
      };
    }).filter(Boolean);
    setViewing({ title: v.name, steps });
  };

  return (
    <div className="flex-1 overflow-auto p-6">
      <div className="flex items-center gap-3 mb-6">
        <div className="relative flex-1 max-w-xs">
          <span className="absolute left-3 top-1/2 -translate-y-1/2 text-stone-400">{Icon.search}</span>
          <input value={q} onChange={(e)=>setQ(e.target.value)} placeholder="Search vinyettes…"
            className="w-full pl-9 pr-4 py-2 border border-stone-200 rounded-xl text-sm focus:border-sage-400 focus:ring-2 focus:ring-sage-100 transition-all" />
        </div>
        <Btn variant="primary" onClick={()=>{ setEditing(null); setShowForm(true); }}>{Icon.plus} New Vinyette</Btn>
      </div>

      {filtered.length === 0 ? (
        <div className="flex flex-col items-center justify-center py-20 text-center">
          <p className="font-display text-xl text-stone-400 mb-2">{q ? 'No vinyettes found' : 'No vinyettes yet'}</p>
          <p className="text-sm text-stone-400 mb-5">{q ? 'Try a different search' : 'Build a mini-sequence to get started'}</p>
          {!q && <Btn variant="primary" onClick={()=>setShowForm(true)}>{Icon.plus} New Vinyette</Btn>}
        </div>
      ) : (
        <div className="space-y-3 max-w-2xl">
          {filtered.map(v => {
            const posePreviews = v.items.slice(0,4).map(i=>poses.find(p=>p.id===i.poseId)).filter(Boolean);
            return (
              <div key={v.id} className="bg-white rounded-2xl border border-stone-100 shadow-sm hover:shadow-md transition-all p-4 flex items-center gap-4">
                <div className="flex gap-1 shrink-0">
                  {posePreviews.map((p,i)=>(
                    <div key={i} className="w-10 h-10 rounded-lg overflow-hidden bg-sage-100 border-2 border-white -ml-1 first:ml-0 shadow-sm">
                      <PoseImg src={p.imageUrl} alt={p.name} className="w-full h-full object-cover" />
                    </div>
                  ))}
                  {v.items.length > 4 && (
                    <div className="w-10 h-10 rounded-lg bg-stone-100 border-2 border-white -ml-1 flex items-center justify-center shadow-sm">
                      <span className="text-xs text-stone-500 font-medium">+{v.items.length-4}</span>
                    </div>
                  )}
                </div>
                <div className="flex-1 min-w-0">
                  <p className="font-display font-semibold text-stone-800">{v.name}</p>
                  <p className="text-xs text-stone-400">{v.items.length} pose{v.items.length!==1?'s':''}</p>
                </div>
                <div className="flex gap-2">
                  <Btn variant="secondary" size="xs" onClick={()=>viewSteps(v)}>{Icon.eye} View</Btn>
                  <Btn variant="ghost" size="xs" onClick={()=>{ setEditing(v); setShowForm(true); }}>{Icon.edit}</Btn>
                  <Btn variant="ghost" size="xs" onClick={()=>setDelId(v.id)} className="hover:text-red-400">{Icon.trash}</Btn>
                </div>
              </div>
            );
          })}
        </div>
      )}

      {(showForm || editing) && (
        <VinyetteFormModal vinyette={editing} onSave={handleSave} onClose={()=>{ setShowForm(false); setEditing(null); }} />
      )}
      {viewing && <SequenceViewer title={viewing.title} steps={viewing.steps} onClose={()=>setViewing(null)} />}
      {delId && (
        <ConfirmDialog message="Delete this vinyette? It will be removed from any full classes that use it."
          onConfirm={()=>{ deleteVinyette(delId); setDelId(null); }} onCancel={()=>setDelId(null)} />
      )}
    </div>
  );
}

// ─── Class Form Modal ─────────────────────────────────────────────────────────
function ClassFormModal({ cls, onSave, onClose }) {
  const { poses, vinyettes, transitions, addVinyette: saveVinyette, saveTransitionToLibrary, addPose: ctxAddPose, updatePose: ctxUpdatePose } = useApp();
  const [name, setName] = useState(cls?.name || '');
  const [items, setItems] = useState(cls?.items ? cls.items.map(i=>({...i, cues: i.cues ? [...i.cues] : undefined, transition: i.transition ? {...i.transition, cues:[...(i.transition.cues||[])]} : (i.type !== 'section' ? emptyTransition() : undefined)})) : []);
  const [q, setQ] = useState('');
  const [catFilter, setCatFilter] = useState([]);
  const [pickerTab, setPickerTab] = useState('poses');
  const [expandedVinyettes, setExpandedVinyettes] = useState({});
  const [expandedPoses, setExpandedPoses] = useState({});
  const [quickAddVariationFor, setQuickAddVariationFor] = useState(null);
  const [quickVarName, setQuickVarName] = useState('');
  const [showQuickAdd, setShowQuickAdd] = useState(false);
  const [quickAddName, setQuickAddName] = useState('');
  const [quickAddSided, setQuickAddSided] = useState(false);
  const [collapsedSections, setCollapsedSections] = useState({});
  const [newSectionName, setNewSectionName] = useState('');
  const [savingSection, setSavingSection] = useState(null); // {idx, name}
  const [deletingSection, setDeletingSection] = useState(null); // section index
  const { onDragStart, onDrop } = useDragSort(items, setItems);

  // For each item index, find its parent section index (null if no section above it)
  const sectionOf = useMemo(() => {
    const map = {};
    let cur = null;
    items.forEach((item, i) => { if (item.type === 'section') { cur = i; map[i] = null; } else { map[i] = cur; } });
    return map;
  }, [items]);

  const filteredPoses = useMemo(()=>poses.filter(p=>{
    if(!p.name.toLowerCase().includes(q.toLowerCase())) return false;
    if(catFilter.length>0 && !catFilter.some(c=>p.categories?.includes(c))) return false;
    return true;
  }),[poses,q,catFilter]);
  const filteredVinyettes = useMemo(()=>vinyettes.filter(v=>v.name.toLowerCase().includes(q.toLowerCase())),[vinyettes,q]);

  const addPose = (p, variationId = null) => setItems(it => {
    const prevPose = [...it].reverse().find(x => x.type === 'pose');
    const prevPoseId = prevPose ? prevPose.refId : null;
    const match = lookupTransition(transitions, prevPoseId, p.id);
    const transition = match
      ? { libraryId: match.id, cues: match.cues.map(c=>({...c})), enabled: true }
      : emptyTransition();
    const variation = variationId ? (p.variations||[]).find(v=>v.id===variationId) : null;
    const cues = variation ? variation.cues.slice(0,2) : p.cues.slice(0,2);
    return [...it, {type:'pose', refId:p.id, variationId: variationId||null, cues, side:'', transition}];
  });

  const submitQuickVariationClass = (pose) => {
    if (!quickVarName.trim()) return;
    const newVariation = { id: uid(), name: quickVarName.trim(), cues: [] };
    const updatedPose = { ...pose, variations: [...(pose.variations || []), newVariation] };
    ctxUpdatePose(updatedPose);
    addPose(updatedPose, newVariation.id);
    setQuickAddVariationFor(null);
    setQuickVarName('');
  };

  const submitQuickAddClass = () => {
    if (!quickAddName.trim()) return;
    const newPose = { id: uid(), name: quickAddName.trim(), description: '', imageUrl: '', isSided: quickAddSided, categories: [], cues: [], variations: [] };
    ctxAddPose(newPose);
    addPose(newPose, null);
    setShowQuickAdd(false);
    setQuickAddName('');
    setQuickAddSided(false);
  };
  const addVinyette = (v) => setItems(it=>[...it, {type:'vinyette', refId:v.id, cues:[], side:'', transition: emptyTransition()}]);
  const addSection = () => {
    const n = newSectionName.trim() || 'New Section';
    setItems(it=>[...it, {type:'section', name:n}]);
    setNewSectionName('');
  };
  const save = () => {
    if (!name.trim()) return;
    onSave({ ...cls, id: cls?.id || uid(), name: name.trim(), items });
  };

  const toggleVinyetteExpand = (i) => setExpandedVinyettes(e=>({...e,[i]:!e[i]}));

  // Collect items belonging to a section (between this section header and the next)
  const getSectionItems = (sectionIdx) => {
    const result = [];
    for (let i = sectionIdx + 1; i < items.length && items[i].type !== 'section'; i++) {
      result.push(items[i]);
    }
    return result;
  };

  const confirmSaveAsVinyette = () => {
    if (!savingSection) return;
    const vName = savingSection.name.trim();
    if (!vName) return;
    const sectionItems = getSectionItems(savingSection.idx);
    const vinyetteItems = sectionItems
      .filter(it => it.type === 'pose')
      .map(it => ({ poseId: it.refId, cues: [...it.cues], side: it.side||'', transition: it.transition ? {...it.transition, cues:[...(it.transition.cues||[])]} : emptyTransition() }));
    if (vinyetteItems.length === 0) { setSavingSection(null); return; }
    saveVinyette({ id: uid(), name: vName, items: vinyetteItems });
    setSavingSection(null);
  };

  const deleteSection = (sectionIdx) => {
    setItems(it => {
      // Delete the header + everything up to (not including) the next section header
      let end = sectionIdx + 1;
      while (end < it.length && it[end].type !== 'section') end++;
      return [...it.slice(0, sectionIdx), ...it.slice(end)];
    });
    setDeletingSection(null);
  };

  const setSectionSide = (sectionIdx, side) => {
    setItems(it => {
      // Recompute sectionOf inline to avoid stale closure
      const sectMap = {};
      let cur = null;
      it.forEach((item, i) => { if (item.type === 'section') { cur = i; sectMap[i] = null; } else { sectMap[i] = cur; } });
      return it.map((item, i) => {
        if (item.type !== 'pose') return item;
        if (sectMap[i] !== sectionIdx) return item;
        const pose = poses.find(p => p.id === item.refId);
        if (!pose?.isSided) return item;
        return { ...item, side };
      });
    });
  };

  const copyMirroredSection = (sectionIdx) => {
    const sectionItem = items[sectionIdx];
    const sectionItems = getSectionItems(sectionIdx);
    const mirrored = [
      { type: 'section', name: sectionItem.name + ' (Mirrored)' },
      ...sectionItems.map(item => ({
        ...item,
        side: flipSide(item.side || ''),
        transition: item.transition ? { ...item.transition, cues: [...(item.transition.cues||[])] } : emptyTransition()
      }))
    ];
    // Insert after last item of current section
    const lastIdx = sectionIdx + sectionItems.length;
    setItems(it => [...it.slice(0, lastIdx+1), ...mirrored, ...it.slice(lastIdx+1)]);
  };

  return (
    <Modal title={cls ? 'Edit Class' : 'New Full Class'} onClose={onClose} wide>
      <div className="flex flex-col h-full" style={{minHeight:'60vh'}}>
        <div className="px-6 py-4 border-b border-stone-100">
          <input value={name} onChange={(e)=>setName(e.target.value)} placeholder="Class name…"
            className="w-full text-lg font-display border border-stone-200 rounded-xl px-4 py-2.5 focus:border-sage-400 focus:ring-2 focus:ring-sage-100 transition-all" />
        </div>
        <div className="flex flex-1 overflow-hidden" style={{minHeight:'400px'}}>
          {/* Picker */}
          <div className="w-60 border-r border-stone-100 flex flex-col shrink-0">
            <div className="flex border-b border-stone-100">
              {['poses','vinyettes'].map(t=>(
                <button key={t} onClick={()=>setPickerTab(t)}
                  className={`flex-1 py-2.5 text-sm font-medium transition-colors capitalize ${pickerTab===t?'text-sage-700 border-b-2 border-sage-500':'text-stone-400 hover:text-stone-600'}`}>
                  {t}
                </button>
              ))}
            </div>
            <div className="p-3 border-b border-stone-100">
              <div className="relative">
                <span className="absolute left-2.5 top-1/2 -translate-y-1/2 text-stone-400">{Icon.search}</span>
                <input value={q} onChange={(e)=>setQ(e.target.value)} placeholder="Search…"
                  className="w-full pl-8 pr-3 py-1.5 text-sm border border-stone-200 rounded-lg focus:border-sage-300 transition-all" />
              </div>
            </div>
            {pickerTab==='poses' && <CategoryFilter selected={catFilter} onChange={setCatFilter} />}
            <div className="flex-1 overflow-auto scrollbar-thin p-2 space-y-0.5">
              {pickerTab==='poses' && filteredPoses.length === 0 && <p className="text-xs text-stone-400 p-2 text-center">No poses found</p>}
              {pickerTab==='poses' && filteredPoses.map(p=>{
                const hasVariations = (p.variations||[]).length > 0;
                const isExpanded = !!expandedPoses[p.id];
                const isAddingVariation = quickAddVariationFor === p.id;
                return (
                  <div key={p.id}>
                    <div className="flex items-center gap-2 px-2 py-1.5 rounded-lg hover:bg-sage-50 transition-colors group">
                      <div className="w-8 h-8 rounded-md overflow-hidden bg-sage-100 shrink-0 cursor-pointer" onClick={()=>addPose(p)}>
                        <PoseImg src={p.imageUrl} alt={p.name} className="w-full h-full object-cover" />
                      </div>
                      <span className="flex-1 text-sm text-stone-700 truncate group-hover:text-sage-700 cursor-pointer" onClick={()=>addPose(p)}>{p.name}</span>
                      {hasVariations && (
                        <button type="button" onClick={()=>setExpandedPoses(e=>({...e,[p.id]:!e[p.id]}))}
                          className={`text-stone-300 hover:text-stone-500 transition-all shrink-0 ${isExpanded?'':'-rotate-90'}`}>
                          {Icon.chevDown}
                        </button>
                      )}
                      <span className="text-stone-300 group-hover:text-sage-400 shrink-0 cursor-pointer" onClick={()=>addPose(p)}>{Icon.plus}</span>
                    </div>
                    {isExpanded && (
                      <div className="ml-3 border-l border-stone-100 pl-2 space-y-0.5 mb-0.5">
                        {(p.variations||[]).map(v=>(
                          <button key={v.id} type="button" onClick={()=>addPose(p, v.id)}
                            className="w-full flex items-center gap-2 px-2 py-1.5 rounded-lg hover:bg-terra-50 text-left transition-colors group/v">
                            <div className="w-5 h-5 rounded bg-terra-100 flex items-center justify-center text-terra-400 shrink-0 text-xs font-bold">V</div>
                            <span className="flex-1 text-xs text-stone-600 truncate group-hover/v:text-terra-700">{v.name||'Unnamed'}</span>
                            <span className="text-stone-300 group-hover/v:text-terra-400 shrink-0">{Icon.plus}</span>
                          </button>
                        ))}
                        {isAddingVariation ? (
                          <div className="px-1 py-1.5 space-y-1.5">
                            <input autoFocus value={quickVarName} onChange={e=>setQuickVarName(e.target.value)}
                              onKeyDown={e=>{if(e.key==='Enter')submitQuickVariationClass(p);if(e.key==='Escape'){setQuickAddVariationFor(null);setQuickVarName('');}}}
                              placeholder="Variation name…"
                              className="w-full text-xs border border-terra-200 rounded-lg px-2.5 py-1.5 focus:border-terra-400 focus:ring-1 focus:ring-terra-50 transition-all" />
                            <div className="flex gap-1.5">
                              <Btn size="xs" variant="terra" onClick={()=>submitQuickVariationClass(p)} disabled={!quickVarName.trim()}>Add</Btn>
                              <button onClick={()=>{setQuickAddVariationFor(null);setQuickVarName('');}} className="text-stone-400 hover:text-stone-600 p-1">{Icon.x}</button>
                            </div>
                          </div>
                        ) : (
                          <button type="button" onClick={()=>{setQuickAddVariationFor(p.id);setQuickVarName('');}}
                            className="w-full flex items-center gap-1.5 px-2 py-1.5 text-xs text-stone-400 hover:text-terra-600 transition-colors">
                            {Icon.plus} New variation…
                          </button>
                        )}
                      </div>
                    )}
                  </div>
                );
              })}
              {pickerTab==='vinyettes' && filteredVinyettes.map(v=>(
                <button key={v.id} onClick={()=>addVinyette(v)}
                  className="w-full flex items-center gap-2 px-2 py-2 rounded-lg hover:bg-terra-50 text-left transition-colors group">
                  <div className="w-8 h-8 rounded-md bg-terra-100 flex items-center justify-center shrink-0 text-terra-400">{Icon.flower}</div>
                  <div className="flex-1 min-w-0">
                    <p className="text-sm text-stone-700 truncate group-hover:text-terra-700">{v.name}</p>
                    <p className="text-xs text-stone-400">{v.items.length} poses</p>
                  </div>
                  <span className="ml-auto text-stone-300 group-hover:text-terra-400 shrink-0">{Icon.plus}</span>
                </button>
              ))}
            </div>
            {/* Quick add new pose — only visible in poses tab */}
            {pickerTab === 'poses' && (
              <div className="border-t border-stone-100">
                {showQuickAdd ? (
                  <div className="p-2.5 space-y-2 bg-stone-50">
                    <p className="text-xs font-medium text-stone-500">New pose</p>
                    <input autoFocus value={quickAddName} onChange={e=>setQuickAddName(e.target.value)}
                      onKeyDown={e=>{if(e.key==='Enter')submitQuickAddClass();if(e.key==='Escape'){setShowQuickAdd(false);setQuickAddName('');}}}
                      placeholder="Pose name…"
                      className="w-full text-sm border border-stone-200 rounded-lg px-3 py-1.5 focus:border-sage-400 focus:ring-1 focus:ring-sage-100 transition-all" />
                    <div className="flex items-center gap-2">
                      <button type="button" onClick={()=>setQuickAddSided(s=>!s)}
                        className={`px-2 py-0.5 rounded text-xs font-medium transition-all ${quickAddSided ? 'bg-sage-500 text-white' : 'bg-stone-100 text-stone-500'}`}>L/R</button>
                      <span className="text-xs text-stone-400">One-sided</span>
                    </div>
                    <div className="flex gap-1.5">
                      <Btn size="xs" variant="primary" onClick={submitQuickAddClass} disabled={!quickAddName.trim()} className="flex-1 justify-center">Add to class</Btn>
                      <button onClick={()=>{setShowQuickAdd(false);setQuickAddName('');}} className="text-stone-400 hover:text-stone-600 p-1">{Icon.x}</button>
                    </div>
                  </div>
                ) : (
                  <button onClick={()=>setShowQuickAdd(true)}
                    className="w-full flex items-center gap-2 px-3 py-2.5 text-xs text-stone-400 hover:text-sage-600 hover:bg-stone-50 transition-colors">
                    {Icon.plus} New pose…
                  </button>
                )}
              </div>
            )}
          </div>
          {/* Sequence */}
          <div className="flex-1 overflow-auto scrollbar-thin p-4 space-y-3">
            <div className="flex items-center gap-2 pb-1 border-b border-stone-100">
              <input value={newSectionName} onChange={(e)=>setNewSectionName(e.target.value)}
                onKeyDown={(e)=>e.key==='Enter'&&(e.preventDefault(),addSection())}
                placeholder="Section name (e.g. Warm Up)…"
                className="flex-1 text-sm border border-stone-200 rounded-lg px-3 py-1.5 focus:border-sage-300 focus:ring-1 focus:ring-sage-100 transition-all" />
              <Btn variant="secondary" size="xs" onClick={addSection}>
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="w-3.5 h-3.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                Add Section
              </Btn>
            </div>
            {items.length === 0 && (
              <div className="flex flex-col items-center justify-center py-12 text-center text-stone-400">
                <p className="font-display text-lg mb-1">Empty class</p>
                <p className="text-sm">Add poses or vinyettes from the left, or create sections to organise them</p>
              </div>
            )}
            {items.map((item, i) => {
              const isLast = i===items.length-1;
              // Hide items that belong to a collapsed section
              if (item.type !== 'section' && sectionOf[i] !== null && collapsedSections[sectionOf[i]]) return null;

              if (item.type==='section') {
                const isSaving = savingSection?.idx === i;
                const isDeleting = deletingSection === i;
                const isCollapsed = !!collapsedSections[i];
                const sectionPoseCount = getSectionItems(i).filter(x=>x.type==='pose').length;
                const hasSideablePoses = getSectionItems(i).some(x => x.type==='pose' && poses.find(p=>p.id===x.refId)?.isSided);
                const hasSidedInSection = getSectionItems(i).some(x => x.type==='pose' && (x.side === 'right' || x.side === 'left'));
                return (
                  <div key={i} draggable onDragStart={()=>onDragStart(i)} onDragOver={(e)=>e.preventDefault()} onDrop={()=>onDrop(i)}
                    className="rounded-xl overflow-hidden shadow-sm">
                    <div className="flex items-center gap-2 bg-stone-700 px-3 py-2.5">
                      <span className="cursor-grab text-stone-400 hover:text-stone-200">{Icon.drag}</span>
                      {/* collapse toggle */}
                      <button onClick={()=>setCollapsedSections(c=>({...c,[i]:!c[i]}))}
                        className={`text-stone-400 hover:text-stone-200 transition-transform ${isCollapsed ? '-rotate-90' : ''}`}>
                        {Icon.chevDown}
                      </button>
                      <input value={item.name}
                        onChange={(e)=>setItems(it=>it.map((x,j)=>j===i?{...x,name:e.target.value}:x))}
                        className="flex-1 bg-transparent text-white font-display text-sm font-semibold focus:outline-none placeholder-stone-400 min-w-0"
                        placeholder="Section name…" />
                      {isCollapsed && sectionPoseCount > 0 && (
                        <span className="text-xs text-stone-400 bg-stone-600 px-2 py-0.5 rounded-full shrink-0">{sectionPoseCount} pose{sectionPoseCount!==1?'s':''}</span>
                      )}
                      {hasSideablePoses && !isSaving && (
                        <div className="flex gap-0.5 shrink-0">
                          {[['left','◀ L'],['right','R ▶']].map(([side, label]) => (
                            <button key={side} type="button" onClick={()=>setSectionSide(i, side)}
                              className="text-xs px-2 py-0.5 rounded font-medium bg-stone-600 text-stone-300 hover:bg-sage-600 hover:text-white transition-all">
                              {label}
                            </button>
                          ))}
                        </div>
                      )}
                      {hasSidedInSection && !isSaving && (
                        <button onClick={()=>copyMirroredSection(i)}
                          className="shrink-0 flex items-center gap-1 text-xs text-stone-300 hover:text-terra-300 bg-stone-600 hover:bg-stone-500 px-2 py-1 rounded-lg transition-colors">
                          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="w-3 h-3"><path d="M8 3H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h3"/><path d="M16 3h3a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-3"/><line x1="12" y1="3" x2="12" y2="21"/></svg>
                          Mirror
                        </button>
                      )}
                      {sectionPoseCount > 0 && !isSaving && !isCollapsed && (
                        <button onClick={()=>setSavingSection({idx:i, name:item.name})}
                          className="shrink-0 flex items-center gap-1 text-xs text-stone-300 hover:text-sage-300 bg-stone-600 hover:bg-stone-500 px-2 py-1 rounded-lg transition-colors">
                          {Icon.flower} Save as vinyette
                        </button>
                      )}
                      <button onClick={()=>{ setSavingSection(null); setDeletingSection(i); }} className="text-stone-500 hover:text-red-400 transition-colors ml-1">{Icon.x}</button>
                    </div>
                    {isDeleting && (
                      <div className="flex items-center gap-2 bg-red-950/60 px-3 py-2.5 border-t border-red-900/40">
                        <span className="text-xs text-red-300 flex-1">
                          Delete <span className="font-semibold">"{item.name}"</span>
                          {sectionPoseCount > 0 && <> and {sectionPoseCount} pose{sectionPoseCount!==1?'s':''}</>}?
                        </span>
                        <button onClick={()=>deleteSection(i)}
                          className="shrink-0 text-xs bg-red-600 hover:bg-red-500 text-white px-3 py-1.5 rounded-lg transition-colors font-medium">
                          Delete
                        </button>
                        <button onClick={()=>setDeletingSection(null)} className="shrink-0 text-red-400 hover:text-white transition-colors">{Icon.x}</button>
                      </div>
                    )}
                    {isSaving && (
                      <div className="flex items-center gap-2 bg-stone-800 px-3 py-2.5 border-t border-stone-600">
                        <span className="text-xs text-stone-400 shrink-0">Vinyette name:</span>
                        <input autoFocus value={savingSection.name}
                          onChange={(e)=>setSavingSection(s=>({...s,name:e.target.value}))}
                          onKeyDown={(e)=>{ if(e.key==='Enter') confirmSaveAsVinyette(); if(e.key==='Escape') setSavingSection(null); }}
                          className="flex-1 bg-stone-700 text-white text-sm rounded-lg px-3 py-1.5 focus:outline-none focus:ring-1 focus:ring-sage-500 min-w-0"
                          placeholder="Name for this vinyette…" />
